# 📈 투자 파이프라인 배포 (GitHub Actions)
#
# 하루 리듬:
#   - 모닝 브리핑: 미국 장 마감 후 KST 화~토 06:30 자동 실행 → Notion 발행
#   - 투자 일지: 한국 장 마감 후 수동 실행(Actions 탭 → Run workflow → memo 입력)
#     또는 로컬에서 `python invest.py --memo "..."`
#
# 필요한 Secrets (repo Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY / XAI_API_KEY / NOTION_API_KEY / NOTION_DATABASE_ID
#   MARKET_CSV_URLS  ← 구글시트 "웹에 게시 → CSV" URL (미국 시세, Yahoo 429 우회)
#
# 참고:
#   - thesis.md / portfolio.md가 리포에 없으면 기본 구성으로 동작한다.
#     전제·워치리스트를 반영하려면 커밋하거나 (private repo 권장) Secrets로 주입.
#   - Actions 러너는 실행마다 초기화되므로, 오후 일지를 Actions에서 돌리면
#     아침 브리핑 상태가 없어 Grok 분석을 한 번 더 실행한다 (동작에는 문제 없음).
#     아침 분석 재사용은 로컬 실행에서 유효하다.

name: daily-invest

on:
  schedule:
    - cron: "30 21 * * 1-5"  # UTC 월~금 21:30 = KST 화~토 06:30 (미장 마감 후) → 브리핑
    - cron: "0 0 * * 6"      # UTC 토 00:00 = KST 토 09:00 → 주간 회고
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드"
        type: choice
        options: [brief, journal, weekly, check]
        default: journal
      memo:
        description: "오늘의 투자 메모 (journal 모드)"
        required: false
        default: ""

permissions:
  contents: write  # 신호 로그(signal_log/) 자동 커밋용

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Seoul  # date.today()가 한국 날짜가 되도록
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      MARKET_CSV_URLS: ${{ secrets.MARKET_CSV_URLS }}  # 구글시트 웹 게시 CSV URL(들), 쉼표 구분
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run pipeline
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then
            # 스케줄 실행: 토요일 09시(KST) cron이면 주간 회고, 아니면 브리핑
            if [ "${{ github.event.schedule }}" = "0 0 * * 6" ]; then MODE=weekly; else MODE=brief; fi
          fi
          if [ "$MODE" = "journal" ]; then
            python invest.py --memo "${{ github.event.inputs.memo }}"
          elif [ "$MODE" = "weekly" ]; then
            python invest.py --weekly
          elif [ "$MODE" = "check" ]; then
            python invest.py --check
          else
            python invest.py --brief
          fi
      - name: Commit accumulated data
        # 신호 성적표·시세 이력 축적 — 러너는 매번 초기화되므로 repo에 커밋해 보존
        run: |
          git config user.name "invest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add signal_log market_history 2>/dev/null || true
          git diff --cached --quiet || { git commit -m "chore: market data $(date +%F)"; git push; }
